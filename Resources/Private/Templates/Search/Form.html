<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:form action="results" method="post" name="search" class="search-form">
    <div class="search-form__field">
        <f:form.textfield
            name="query"
            value="{query}"
            placeholder="{f:translate(key: 'search.placeholder', default: 'Search...')}"
            class="search-form__input"
            additionalAttributes="{autocomplete: 'off'}"
        />
        <f:form.submit
            value="{f:translate(key: 'search.submit', default: 'Search')}"
            class="search-form__submit"
        />
    </div>
</f:form>

</html>
