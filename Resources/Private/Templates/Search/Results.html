<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:form action="results" method="post" name="search" class="search-form">
    <f:form.validationResults>
        <f:if condition="{validationResults.flattenedErrors}">
            <div class="search-form__errors" role="alert">
                <f:for each="{validationResults.flattenedErrors}" as="errors" key="propertyName">
                    <f:for each="{errors}" as="error">
                        <p class="search-form__error">{error.message}</p>
                    </f:for>
                </f:for>
            </div>
        </f:if>
    </f:form.validationResults>
    <div class="search-form__field">
        <f:form.textfield
            name="query"
            value="{query}"
            placeholder="{f:translate(key: 'search.placeholder', default: 'Search...')}"
            class="search-form__input"
        />
        <f:form.submit
            value="{f:translate(key: 'search.submit', default: 'Search')}"
            class="search-form__submit"
        />
    </div>
</f:form>

<f:if condition="{synthesisResult}">
    <f:if condition="{synthesisResult.answer}">
        <div class="search-synthesis">
            <div class="search-synthesis__answer">
                {synthesisResult.answer}
            </div>
            <f:if condition="{synthesisResult.sources}">
                <div class="search-synthesis__sources">
                    <h4 class="search-synthesis__sources-heading">
                        <f:translate key="search.synthesis.sources" default="Sources" />
                    </h4>
                    <ul class="search-synthesis__sources-list">
                        <f:for each="{synthesisResult.sources}" as="source">
                            <li class="search-synthesis__sources-item">
                                <a href="{source.url}" class="search-synthesis__sources-link">
                                    {source.title}
                                </a>
                            </li>
                        </f:for>
                    </ul>
                </div>
            </f:if>
        </div>
    </f:if>
</f:if>

<div class="search-results" data-testid="search-results">
    <p class="search-results__count">
        <f:translate
            key="search.results.count"
            arguments="{0: count, 1: query}"
            default="{count} results for &quot;{query}&quot;"
        />
    </p>

    <f:if condition="{results}">
        <f:then>
            <ol class="search-results__list">
                <f:for each="{results}" as="result">
                    <li class="search-results__item" data-testid="search-result-item">
                        <a href="{result.url}" class="search-results__link">
                            <span class="search-results__icon">{result.icon}</span>
                            <span class="search-results__title">{result.title}</span>
                        </a>
                        <p class="search-results__snippet">{result.snippet}</p>
                        <span class="search-results__meta">
                            <span class="search-results__score">{result.score}</span>
                            <f:if condition="{result.date}">
                                <time class="search-results__date" datetime="{result.date -> f:format.date(format: 'Y-m-d')}">
                                    {result.date -> f:format.date()}
                                </time>
                            </f:if>
                        </span>
                    </li>
                </f:for>
            </ol>
        </f:then>
        <f:else>
            <p class="search-results__none" data-testid="search-no-results">
                <f:translate key="search.results.none" default="No results found." />
            </p>
        </f:else>
    </f:if>
</div>

</html>
